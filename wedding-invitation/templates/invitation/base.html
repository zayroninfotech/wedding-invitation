{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ w.groom.name }} Weds {{ w.bride.name }} | Wedding Invitation</title>
  <meta name="description" content="{{ w.invitation_message }}" />
  <meta property="og:title"       content="{{ w.groom.name }} Weds {{ w.bride.name }}" />
  <meta property="og:description" content="{{ w.invitation_message }}" />
  <meta property="og:type"        content="website" />
  <link rel="stylesheet" href="{% static 'css/wedding.css' %}" />
</head>
<body style="overflow-x:hidden;">

{% block content %}{% endblock %}

<script src="{% static 'js/wedding.js' %}"></script>
</body>
</html>
