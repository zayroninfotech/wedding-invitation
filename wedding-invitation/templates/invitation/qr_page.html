<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wedding Invitation QR — {{ groom_name }} & {{ bride_name }}</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:linear-gradient(160deg,#060E24 0%,#0D1B4B 50%,#060E24 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Palatino Linotype',Georgia,serif;color:#fff;padding:2rem 1rem;}
  .card{background:linear-gradient(145deg,#0B1640,#081230);border:2px solid rgba(212,160,23,0.55);border-radius:1.5rem;padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;box-shadow:0 0 60px rgba(212,160,23,0.15),0 30px 80px rgba(0,0,0,0.5);position:relative;}
  .corner{position:absolute;width:40px;height:40px;}
  .corner svg{display:block;}
  .c-tl{top:-1px;left:-1px;} .c-tr{top:-1px;right:-1px;transform:scaleX(-1);} .c-bl{bottom:-1px;left:-1px;transform:scaleY(-1);} .c-br{bottom:-1px;right:-1px;transform:scale(-1);}
  .om{font-size:2.5rem;color:#D4A017;margin-bottom:0.5rem;filter:drop-shadow(0 0 12px rgba(212,160,23,0.6));}
  .names{font-size:1.6rem;color:#D4A017;margin-bottom:0.2rem;text-shadow:0 0 20px rgba(212,160,23,0.4);}
  .date{color:rgba(147,197,253,0.6);font-size:0.85rem;margin-bottom:0.3rem;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,23,0.5),transparent);margin:1rem auto;width:80%;}
  .label{color:rgba(212,160,23,0.6);font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:0.75rem;}
  .qr-wrap{background:#fff;border-radius:12px;padding:12px;display:inline-block;border:3px solid rgba(212,160,23,0.4);box-shadow:0 0 30px rgba(212,160,23,0.3);}
  .qr-wrap img{width:220px;height:220px;display:block;}
  .url{color:rgba(212,160,23,0.55);font-size:0.72rem;margin:1rem 0 0.5rem;word-break:break-all;font-family:monospace;}
  .btn-row{display:flex;gap:0.75rem;justify-content:center;margin-top:1.25rem;flex-wrap:wrap;}
  .btn{padding:0.6rem 1.4rem;border-radius:2rem;font-size:0.85rem;font-weight:600;cursor:pointer;text-decoration:none;border:none;display:inline-flex;align-items:center;gap:0.4rem;transition:transform 0.2s;}
  .btn:hover{transform:scale(1.04);}
  .btn-gold{background:linear-gradient(135deg,#D4A017,#B8860B);color:#060E24;}
  .btn-outline{background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.4);color:#D4A017;}
  .btn-back{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);}
  .scan-hint{color:rgba(255,255,255,0.3);font-size:0.7rem;margin-top:1.5rem;letter-spacing:0.05em;}
  #copy-msg{display:none;color:#4ade80;font-size:0.75rem;margin-top:0.4rem;}
</style>
</head>
<body>
<div class="card">
  <!-- Corner flourishes -->
  <div class="corner c-tl"><svg width="40" height="40" viewBox="0 0 40 40"><g fill="#D4A017" opacity="0.8"><path d="M2,2 L16,2 L16,5 L5,5 L5,16 L2,16 Z"/><circle cx="16" cy="16" r="2.5"/></g></svg></div>
  <div class="corner c-tr"><svg width="40" height="40" viewBox="0 0 40 40"><g fill="#D4A017" opacity="0.8"><path d="M2,2 L16,2 L16,5 L5,5 L5,16 L2,16 Z"/><circle cx="16" cy="16" r="2.5"/></g></svg></div>
  <div class="corner c-bl"><svg width="40" height="40" viewBox="0 0 40 40"><g fill="#D4A017" opacity="0.8"><path d="M2,2 L16,2 L16,5 L5,5 L5,16 L2,16 Z"/><circle cx="16" cy="16" r="2.5"/></g></svg></div>
  <div class="corner c-br"><svg width="40" height="40" viewBox="0 0 40 40"><g fill="#D4A017" opacity="0.8"><path d="M2,2 L16,2 L16,5 L5,5 L5,16 L2,16 Z"/><circle cx="16" cy="16" r="2.5"/></g></svg></div>

  <div class="om">ॐ</div>
  <div class="names">{{ groom_name }} &amp; {{ bride_name }}</div>
  <div class="date">{{ wedding_date }}</div>
  <div class="divider"></div>
  <div class="label">Scan to Open Invitation</div>
  <div class="qr-wrap">
    <img src="/qr/" alt="Wedding QR Code">
  </div>
  <div class="url" id="invite-url">{{ invite_url }}</div>
  <div id="copy-msg">✓ Link copied!</div>
  <div class="btn-row">
    <a href="/qr/" download="wedding-qr.svg" class="btn btn-gold">⬇ Download QR</a>
    <button class="btn btn-outline" onclick="copyLink()">📋 Copy Link</button>
  </div>
  <div class="btn-row" style="margin-top:0.5rem;">
    <a href="/dashboard/" class="btn btn-back">← Dashboard</a>
    <a href="/invite-card/" target="_blank" class="btn btn-gold" style="background:linear-gradient(135deg,#8B1A35,#D4A017);">View Invite Card →</a>
  </div>
  <p class="scan-hint">Share this QR with your wedding guests</p>
</div>

<script>
function copyLink(){
  var url=document.getElementById('invite-url').textContent.trim();
  navigator.clipboard.writeText(url).then(function(){
    var msg=document.getElementById('copy-msg');
    msg.style.display='block';
    setTimeout(function(){msg.style.display='none';},2000);
  });
}
</script>
</body>
</html>
